<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>%taobao89/dsfe38%jcd8/3jf%h3f5%hsfj/sfmv%23dfdfg09645</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Monaco', 'Monospace', 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* 主容器 */
        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            z-index: 2;
            flex-direction: column;
        }

        canvas {
            display: block;
            margin: 0 auto;
            cursor: pointer;
            border-radius: 32px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.3);
            width: 100%;
            height: auto;
            max-width: 800px;
            aspect-ratio: 1/1;
        }

        /* 爱心上方的大字520样式 */
        .big-520 {
            position: absolute;
            top: 5%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 5.5rem;
            font-weight: 900;
            font-family: 'Impact', 'Monaco', 'Arial Black', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            letter-spacing: 12px;
            z-index: 15;
            pointer-events: none;
            text-shadow: 0 0 20px #ff3366, 0 0 35px #ff44aa, 0 0 55px #ff88cc;
            background: linear-gradient(135deg, #FFD166, #FF6F91, #FF3E6C, #C34AFF);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bigTextGlow 3s ease infinite, floatText 2.5s ease-in-out infinite;
            white-space: nowrap;
            transform: translateY(0);
        }

        @keyframes bigTextGlow {
            0% {
                text-shadow: 0 0 15px #ff3366, 0 0 30px #ff44aa, 0 0 45px #ff99cc;
                background-position: 0% 50%;
            }
            50% {
                text-shadow: 0 0 30px #ff66cc, 0 0 55px #ff00aa, 0 0 80px #ffaaff;
                background-position: 100% 50%;
            }
            100% {
                text-shadow: 0 0 15px #ff3366, 0 0 30px #ff44aa, 0 0 45px #ff99cc;
                background-position: 0% 50%;
            }
        }

        @keyframes floatText {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* 小屏适配放大字体紧凑 */
        @media (max-width: 640px) {
            .big-520 {
                font-size: 3.8rem;
                letter-spacing: 6px;
                top: 6%;
            }
        }

        @media (max-width: 480px) {
            .big-520 {
                font-size: 2.8rem;
                letter-spacing: 4px;
                top: 5%;
            }
        }

        .credit {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #aa88ff;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 500;
            letter-spacing: 1px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .credit span {
            color: #ff66cc;
            font-weight: bold;
            text-shadow: 0 0 5px #ff44aa;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="heartCanvas" width="800" height="800" style="width: 100%; height: auto; max-width: 800px; aspect-ratio: 1/1;"></canvas>
    <div class="big-520">520</div>
</div>
<div class="credit">❤️ <span>5 2 0</span> · 流星坠梦 · 心悦君兮 · 霓虹心语 ❤️</div>

<script>
    (function() {
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 800;
        canvas.width = SIZE;
        canvas.height = SIZE;
        
        // ========== 1. 心形数字部分 (尖角朝下，520构成) ==========
        const scale = 17.8;
        const offsetX = SIZE/2;
        const offsetY = SIZE/2 + 20;
        
        // 经典心形参数: 尖角向下 (调整负号)
        function heartPosition(t) {
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            // 负号让心尖朝下 (原本y公式为正时尖角朝上)
            const yRaw = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
            return { x: xRaw, y: yRaw };
        }
        
        function getHeartContourPoints(sampleCount) {
            const points = [];
            for (let i = 0; i <= sampleCount; i++) {
                const t = (i / sampleCount) * Math.PI * 2;
                const { x, y } = heartPosition(t);
                const screenX = offsetX + x * scale;
                const screenY = offsetY + y * scale;
                points.push({ x: screenX, y: screenY, t });
            }
            return points;
        }
        
        let heartPolygon = [];
        
        function pointInPolygon(px, py, vertices) {
            let inside = false;
            for (let i = 0, j = vertices.length-1; i < vertices.length; j = i++) {
                const xi = vertices[i].x, yi = vertices[i].y;
                const xj = vertices[j].x, yj = vertices[j].y;
                const intersect = ((yi > py) != (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        
        function getRandom520Char() {
            return ['5', '2', '0'][Math.floor(Math.random() * 3)];
        }
        
        function generateContourItems(contourPoints) {
            const items = [];
            for (let i = 0; i < contourPoints.length; i++) {
                const p = contourPoints[i];
                let char;
                // 轮廓点使用 5 2 0 周期性排布
                if (i % 3 === 0) char = '5';
                else if (i % 3 === 1) char = '2';
                else char = '0';
                items.push({ x: p.x, y: p.y, char: char, isOutline: true });
            }
            return items;
        }
        
        function generateInnerItems(innerCount, contourPoints) {
            const items = [];
            let added = 0;
            const maxAttempts = innerCount * 12;
            for (let attempt = 0; attempt < maxAttempts && added < innerCount; attempt++) {
                const randX = offsetX + (Math.random() - 0.5) * 540;
                const randY = offsetY + (Math.random() - 0.5) * 500;
                if (pointInPolygon(randX, randY, contourPoints)) {
                    items.push({ x: randX, y: randY, char: getRandom520Char(), isOutline: false });
                    added++;
                }
            }
            return items;
        }
        
        const contourSampleCount = 860;   // 更平滑轮廓
        const contourPointsRaw = getHeartContourPoints(contourSampleCount);
        heartPolygon = contourPointsRaw.map(p => ({ x: p.x, y: p.y }));
        
        const contourItems = generateContourItems(contourPointsRaw);
        // 增加内部数字密度 约2500个，爱心更饱满
        const innerItems = generateInnerItems(2450, heartPolygon);
        let drawItems = [...contourItems, ...innerItems];
        
        // 霓虹渐变色函数 (粉紫蓝梦幻流动)
        function getGradientColor(x, y, nowTime) {
            const normX = (x - (offsetX - 260)) / 520;
            const normY = (y - (offsetY - 240)) / 520;
            let mix = (normX * 0.5 + normY * 0.5) + Math.sin(nowTime * 0.65) * 0.12;
            mix = Math.min(0.98, Math.max(0.02, mix));
            let hue;
            if (mix < 0.5) {
                const t = mix / 0.5;
                hue = 320 + (280 - 320) * t;   // 玫红到紫罗兰
            } else {
                const t = (mix - 0.5) / 0.5;
                hue = 280 + (210 - 280) * t;   // 紫罗兰到冰蓝紫
            }
            const flow = Math.sin(nowTime * 1.2 + x * 0.012 + y * 0.01) * 12;
            hue = hue + flow;
            let sat = 80 + Math.sin(nowTime * 2.5) * 15;
            sat = Math.min(100, Math.max(70, sat));
            return { hue, sat };
        }
        
        // ========== 2. 流星粒子特效 (华丽拖尾，左上角落洒向心形) ==========
        class Meteor {
            constructor() {
                this.reset(true);
            }
            
            reset(randomY = true) {
                // 起始区域左上角，让流星轨迹穿过心形区域
                this.x = Math.random() * 380 - 60;
                this.y = randomY ? Math.random() * 280 - 30 : -15;
                // 角度范围 35°~70° 优雅划过爱心
                const angle = (Math.random() * 42 + 32) * Math.PI / 180;
                const speed = Math.random() * 5.8 + 4.2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.length = Math.random() * 14 + 9;
                this.opacity = Math.random() * 0.65 + 0.3;
                // 霓虹流星色系 (粉色/品红/淡紫)
                const hueLight = 280 + Math.random() * 60;
                this.color = `hsla(${hueLight}, 95%, 65%, ${this.opacity})`;
                this.size = Math.random() * 2.8 + 1.6;
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x > SIZE + 120 || this.y > SIZE + 120 || this.x < -120 || this.y < -100) {
                    this.reset(true);
                }
                this.opacity = 0.45 + Math.random() * 0.5;
            }
            
            draw(ctx) {
                if (!this.active) return;
                const endX = this.x - this.vx * this.length;
                const endY = this.y - this.vy * this.length;
                
                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                const mainHue = 290 + Math.sin(Date.now() * 0.008) * 20;
                gradient.addColorStop(0, `hsla(${mainHue}, 100%, 70%, ${this.opacity})`);
                gradient.addColorStop(0.6, `hsla(${mainHue - 20}, 90%, 65%, ${this.opacity * 0.7})`);
                gradient.addColorStop(1, `hsla(${mainHue - 40}, 85%, 60%, 0)`);
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = this.size;
                ctx.strokeStyle = gradient;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `hsl(${mainHue}, 100%, 70%)`;
                ctx.stroke();
                
                // 流星头部光晕
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${mainHue + 10}, 100%, 75%)`;
                ctx.shadowBlur = 14;
                ctx.fill();
            }
        }
        
        // 创建流星雨
        let meteors = [];
        const meteorCount = 52;   // 浪漫52颗流星
        for (let i = 0; i < meteorCount; i++) {
            meteors.push(new Meteor());
        }
        
        // 漂浮星尘粒子 (增加梦幻感)
        class StarParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * SIZE;
                this.y = Math.random() * SIZE;
                this.size = Math.random() * 2.2 + 0.6;
                this.opacity = Math.random() * 0.45 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.25 + 0.1;
                this.hueShift = Math.random() * 360;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            update(now) {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < -15) this.x = SIZE + 15;
                if (this.x > SIZE + 15) this.x = -15;
                if (this.y < -15) this.y = SIZE + 15;
                if (this.y > SIZE + 15) this.y = -15;
                // 呼吸闪烁
                this.opacity = 0.2 + Math.sin(now * 0.0025 + this.phase) * 0.25;
            }
            
            draw(ctx, now) {
                const hueStar = 280 + Math.sin(now * 0.003 + this.hueShift) * 40;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hueStar}, 85%, 70%, ${this.opacity})`;
                ctx.shadowBlur = 4;
                ctx.fill();
            }
        }
        
        const starCount = 180;
        let stars = [];
        for (let i = 0; i < starCount; i++) {
            stars.push(new StarParticle());
        }
        
        // 额外爱心周围光晕粒子（萤火虫光效）
        class GlowDot {
            constructor() {
                this.respawn();
            }
            respawn() {
                // 围绕爱心随机位置
                const angle = Math.random() * Math.PI * 2;
                const rad = 200 + Math.random() * 120;
                const centerX = offsetX;
                const centerY = offsetY;
                this.x = centerX + Math.cos(angle) * rad * (Math.random() * 0.8 + 0.6);
                this.y = centerY + Math.sin(angle) * rad * 0.9 - 15;
                this.size = Math.random() * 2.2 + 1;
                this.life = 0.6 + Math.random() * 0.8;
                this.speedX = (Math.random() - 0.5) * 0.35;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.hue = 300 + Math.random() * 60;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.008;
                if (this.life <= 0 || this.x < -50 || this.x > SIZE+50 || this.y < -50 || this.y > SIZE+70) {
                    this.respawn();
                    this.life = 0.7;
                }
            }
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 95%, 70%, ${this.life * 0.6})`;
                ctx.shadowBlur = 8;
                ctx.fill();
            }
        }
        
        let glowDots = [];
        for (let i = 0; i < 95; i++) {
            glowDots.push(new GlowDot());
        }
        
        // ========== 3. 主渲染循环 包括大520等增强 ==========
        let lastTimestamp = 0;
        
        function renderHeartAndMeteors() {
            if (!ctx) return;
            const nowPerf = performance.now() / 1000;
            const breathFactor = 0.58 + 0.42 * Math.sin(nowPerf * 2.3);
            const flicker = 0.8 + 0.4 * Math.sin(nowPerf * 3.7);
            const globalIntensity = Math.min(1.0, breathFactor * 1.15) * flicker;
            
            // 深邃星空背景
            const gradientBg = ctx.createLinearGradient(0, 0, SIZE, SIZE);
            gradientBg.addColorStop(0, '#040312');
            gradientBg.addColorStop(1, '#010108');
            ctx.fillStyle = gradientBg;
            ctx.fillRect(0, 0, SIZE, SIZE);
            
            // 画遥远星系噪点感（极细微）
            ctx.fillStyle = "rgba(255,200,240,0.05)";
            for(let i=0;i<180;i++) {
                if (Math.random() < 0.05) {
                    ctx.fillRect(Math.random()*SIZE, Math.random()*SIZE, 1, 1);
                }
            }
            
            // 背景星尘
            for (let s of stars) {
                s.update(nowPerf * 1000);
                s.draw(ctx, nowPerf);
            }
            
            // 流星特效绘制
            ctx.shadowBlur = 0;
            for (let meteor of meteors) {
                meteor.update();
                meteor.draw(ctx);
            }
            
            // 光晕粒子飘浮
            for (let dot of glowDots) {
                dot.update();
                dot.draw(ctx);
            }
            
            // ========== 绘制数字爱心主体 (520组成) ==========
            for (let i = 0; i < drawItems.length; i++) {
                const item = drawItems[i];
                const { x, y, char, isOutline } = item;
                const { hue, sat } = getGradientColor(x, y, nowPerf);
                let lightness = 48 + globalIntensity * 48;
                lightness = Math.min(94, Math.max(40, lightness));
                const finalColor = `hsl(${hue}, ${sat}%, ${lightness}%)`;
                
                // 霓虹发光模糊
                ctx.shadowBlur = isOutline ? (8 + 12 * globalIntensity) : (5 + 8 * globalIntensity);
                ctx.shadowColor = `rgba(255, 80, 180, ${0.55 + globalIntensity * 0.5})`;
                
                let fontSize = isOutline ? (21 + 3.5 * Math.sin(nowPerf * 5 + x * 0.016)) : (14.5 + 2.5 * Math.sin(nowPerf * 3.5 + y * 0.022));
                ctx.font = `${isOutline ? 'bold' : '600'} ${fontSize}px "Monaco", "SF Mono", "Fira Code", "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = finalColor;
                ctx.fillText(char, x, y);
                
                // 光晕描边叠加
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255,210,240,${0.18 + globalIntensity*0.2})`;
                ctx.fillText(char, x-0.4, y-0.4);
            }
            
            // 整体爱心额外柔光混合
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = `rgba(255, 130, 210, ${0.07 * (0.7 + globalIntensity)})`;
            ctx.fillRect(0, 0, SIZE, SIZE);
            ctx.globalCompositeOperation = 'source-over';
            
            // 强化心形轮廓光边
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 0.28 + globalIntensity * 0.22;
            ctx.beginPath();
            for (let i = 0; i <= contourPointsRaw.length; i++) {
                const idx = i % contourPointsRaw.length;
                const p = contourPointsRaw[idx];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = `hsl(320, 100%, 72%)`;
            ctx.lineWidth = 3.2;
            ctx.stroke();
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            for (let i = 0; i <= contourPointsRaw.length; i++) {
                const idx = i % contourPointsRaw.length;
                const p = contourPointsRaw[idx];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = `hsl(290, 90%, 65%)`;
            ctx.lineWidth = 1.6;
            ctx.stroke();
            ctx.restore();
            
            // 随机微流星粉尘更生动
            ctx.shadowBlur = 3;
            if (Math.random() > 0.97) {
                for (let k = 0; k < 5; k++) {
                    const dustX = Math.random() * SIZE;
                    const dustY = Math.random() * SIZE * 0.7 + 80;
                    ctx.beginPath();
                    ctx.arc(dustX, dustY, Math.random() * 2.2 + 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${Math.random() * 60 + 290}, 95%, 70%, ${Math.random() * 0.7})`;
                    ctx.fill();
                }
            }
        }
        
        function animate() {
            renderHeartAndMeteors();
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // 动态微调流星数量制造呼吸节奏
        let lastAdjust = 0;
        setInterval(() => {
            const nowAdj = Date.now();
            if (meteors.length < 58 && Math.random() > 0.55) {
                meteors.push(new Meteor());
            } else if (meteors.length > 42 && Math.random() > 0.75) {
                meteors.pop();
            }
            // 浪漫动态星光微刷新
            if (stars.length < 200 && Math.random() > 0.7) stars.push(new StarParticle());
            else if (stars.length > 150 && Math.random() > 0.8) stars.pop();
        }, 7200);
        
        // 画布点击时产生额外小流星雨效果(趣味)
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            for (let i = 0; i < 5; i++) {
                let quickMeteor = new Meteor();
                quickMeteor.x = mouseX + (Math.random() - 0.5) * 60;
                quickMeteor.y = mouseY + (Math.random() - 0.5) * 40;
                quickMeteor.vx = (Math.random() - 0.5) * 6 + 1;
                quickMeteor.vy = (Math.random() - 0.5) * 5 + 2;
                quickMeteor.length = 9;
                meteors.push(quickMeteor);
            }
            // 限制过多流星
            if(meteors.length > 80) meteors.splice(50, 15);
        });
        
        console.log('✨ 梦幻爱心已加载 | 爱心上方加了大字520 | 心形数字构成 | 流星拖尾+粉紫光晕');
    })();
</script>
</body>
