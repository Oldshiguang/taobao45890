<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>520爱心光晕 | 数字霓虹心 (正确方向)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Monaco', 'Monospace', 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            cursor: pointer;
            border-radius: 32px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            height: auto;
        }

        .credit {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #aa88ff;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 500;
            letter-spacing: 1px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .credit span {
            color: #ff66cc;
            font-weight: bold;
            text-shadow: 0 0 5px #ff44aa;
        }

        @media (max-width: 600px) {
            .credit {
                font-size: 10px;
                bottom: 12px;
                padding: 4px 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="heartCanvas" width="800" height="800" style="width: 100%; height: auto; max-width: 800px; aspect-ratio: 1/1;"></canvas>
</div>
<div class="credit">❤️ <span>5 2 0</span> · 心形校正 · 霓虹心语 ❤️</div>

<script>
    (function() {
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 800;
        canvas.width = SIZE;
        canvas.height = SIZE;
        
        let time = 0;
        let animationId = null;
        
        // 标准心形参数方程 (方向正确: 尖角向下，圆弧向上)
        // 公式: x = 16 * sin(t)^3 , y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
        // 这个方程自然生成的心形尖角在底部 (y负半轴区域)，为了让心形在canvas中正向显示，不需要额外旋转
        // 映射时通过偏移和缩放即可
        const scale = 17.5;      // 缩放系数
        const offsetX = SIZE/2;   // 400
        const offsetY = SIZE/2 + 15; // 垂直微调让爱心居中 (因为心形尖角会偏下)
        
        // 心形位置计算
        function heartPosition(t) {
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            return { x: xRaw, y: yRaw };
        }
        
        // 获取心形轮廓点
        function getHeartContourPoints(sampleCount) {
            const points = [];
            for (let i = 0; i <= sampleCount; i++) {
                const t = (i / sampleCount) * Math.PI * 2;
                const { x, y } = heartPosition(t);
                const screenX = offsetX + x * scale;
                const screenY = offsetY + y * scale;
                points.push({ x: screenX, y: screenY, t });
            }
            return points;
        }
        
        let heartPolygon = [];
        
        // 射线法判断点是否在多边形内
        function pointInPolygon(px, py, vertices) {
            let inside = false;
            for (let i = 0, j = vertices.length-1; i < vertices.length; j = i++) {
                const xi = vertices[i].x, yi = vertices[i].y;
                const xj = vertices[j].x, yj = vertices[j].y;
                const intersect = ((yi > py) != (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        
        function getRandom520Char() {
            const chars = ['5', '2', '0'];
            return chars[Math.floor(Math.random() * chars.length)];
        }
        
        // 生成轮廓字符
        function generateContourItems(contourPoints) {
            const items = [];
            for (let i = 0; i < contourPoints.length; i++) {
                const p = contourPoints[i];
                let char;
                if (i % 3 === 0) char = '5';
                else if (i % 3 === 1) char = '2';
                else char = '0';
                items.push({
                    x: p.x,
                    y: p.y,
                    char: char,
                    isOutline: true,
                });
            }
            return items;
        }
        
        // 生成内部填充点
        function generateInnerItems(innerCount, contourPoints) {
            const items = [];
            let added = 0;
            const maxAttempts = innerCount * 10;
            for (let attempt = 0; attempt < maxAttempts && added < innerCount; attempt++) {
                const randX = offsetX + (Math.random() - 0.5) * 540;
                const randY = offsetY + (Math.random() - 0.5) * 500;
                if (pointInPolygon(randX, randY, contourPoints)) {
                    items.push({
                        x: randX,
                        y: randY,
                        char: getRandom520Char(),
                        isOutline: false,
                    });
                    added++;
                }
            }
            // 补充一些径向内部点
            if (added < innerCount) {
                for (let i = 0; i < innerCount - added; i++) {
                    const r = Math.random() * 0.75;
                    const angle = Math.random() * Math.PI * 2;
                    const { x, y } = heartPosition(angle);
                    const screenX = offsetX + x * scale * r;
                    const screenY = offsetY + y * scale * r;
                    if (screenX > 20 && screenX < SIZE-20 && screenY > 20 && screenY < SIZE-20) {
                        items.push({ x: screenX, y: screenY, char: getRandom520Char(), isOutline: false });
                    }
                }
            }
            return items;
        }
        
        // 生成所有绘制元素
        const contourSampleCount = 750;
        const contourPointsRaw = getHeartContourPoints(contourSampleCount);
        heartPolygon = contourPointsRaw.map(p => ({ x: p.x, y: p.y }));
        
        const contourItems = generateContourItems(contourPointsRaw);
        const innerItems = generateInnerItems(2000, heartPolygon);
        let drawItems = [...contourItems, ...innerItems];
        
        // 动态渐变色函数 (粉 -> 紫 -> 蓝，随时间流动)
        function getGradientColorForChar(x, y, nowTime) {
            // 基于位置混合 + 时间流动
            const normX = (x - (offsetX - 260)) / 520;
            const normY = (y - (offsetY - 240)) / 520;
            let mix = (normX * 0.55 + normY * 0.45) + Math.sin(nowTime * 0.7) * 0.1;
            mix = Math.min(0.98, Math.max(0.02, mix));
            
            let hue;
            if (mix < 0.5) {
                const t = mix / 0.5;
                hue = 330 + (280 - 330) * t;
            } else {
                const t = (mix - 0.5) / 0.5;
                hue = 280 + (210 - 280) * t;
            }
            const flow = Math.sin(nowTime * 1.3 + x * 0.015 + y * 0.012) * 10;
            hue = hue + flow;
            let sat = 85 + Math.sin(nowTime * 2.1) * 12;
            sat = Math.min(100, Math.max(70, sat));
            return { hue, sat };
        }
        
        // 渲染主函数
        function render() {
            if (!ctx) return;
            const now = performance.now() / 1000;
            const breathFactor = 0.55 + 0.45 * Math.sin(now * 2.4);
            const flicker = 0.8 + 0.4 * Math.sin(now * 3.6);
            const globalIntensity = Math.min(1.0, breathFactor * 1.2) * flicker;
            
            // 黑底背景
            const gradientBg = ctx.createLinearGradient(0, 0, SIZE, SIZE);
            gradientBg.addColorStop(0, '#050510');
            gradientBg.addColorStop(1, '#000000');
            ctx.fillStyle = gradientBg;
            ctx.fillRect(0, 0, SIZE, SIZE);
            
            // 绘制所有520数字
            for (let i = 0; i < drawItems.length; i++) {
                const item = drawItems[i];
                const { x, y, char, isOutline } = item;
                const { hue, sat } = getGradientColorForChar(x, y, now);
                
                // 亮度随整体闪烁变化
                let lightness = 45 + globalIntensity * 48;
                lightness = Math.min(92, Math.max(38, lightness));
                const finalColor = `hsl(${hue}, ${sat}%, ${lightness}%)`;
                
                // 动态阴影
                ctx.shadowBlur = isOutline ? (7 + 13 * globalIntensity) : (4 + 7 * globalIntensity);
                ctx.shadowColor = `rgba(255, 80, 180, ${0.5 + globalIntensity * 0.6})`;
                
                let fontSize;
                if (isOutline) {
                    fontSize = 21 + 3 * Math.sin(now * 4 + x * 0.018);
                } else {
                    fontSize = 15 + 2 * Math.sin(now * 3 + y * 0.025);
                }
                ctx.font = `${isOutline ? 'bold' : '500'} ${fontSize}px "Monaco", "SF Mono", "Fira Code", "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = finalColor;
                ctx.fillText(char, x, y);
                
                // 二次光晕效果
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255,255,200,${0.15 + globalIntensity*0.2})`;
                ctx.fillText(char, x-0.3, y-0.3);
            }
            
            // 叠加光晕层
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = `rgba(255, 160, 220, ${0.07 * (0.6 + globalIntensity)})`;
            ctx.fillRect(0, 0, SIZE, SIZE);
            ctx.globalCompositeOperation = 'source-over';
            
            // 增强心形轮廓霓虹描边 (不破坏520纯数字感)
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 0.18 + globalIntensity * 0.2;
            ctx.beginPath();
            for (let i = 0; i <= contourPointsRaw.length; i++) {
                const idx = i % contourPointsRaw.length;
                const p = contourPointsRaw[idx];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = `hsl(320, 85%, 70%)`;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }
        
        function animate() {
            render();
            animationId = requestAnimationFrame(animate);
        }
        
        animate();
        
        // 窗口适配
        window.addEventListener('resize', () => {
            // canvas 尺寸由CSS处理，无需额外操作
        });
        
        console.log('❤️ 520爱心数字秀 (方向已校正) | 纯数字5·2·0构成完美心形 | 粉紫蓝渐变+呼吸闪烁');
    })();
</script>
</body>
</html>
